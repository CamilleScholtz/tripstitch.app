{{ define "main" }}

<nav class="breadcrumbs" aria-label="Breadcrumb">
  <a href="{{ "/" | relURL }}">Home</a>
  <span class="breadcrumbs-sep" aria-hidden="true">/</span>
  <a href="{{ "/blog/" | relURL }}">Blog</a>
  <span class="breadcrumbs-sep" aria-hidden="true">/</span>
  <span aria-current="page">{{ .Title }}</span>
</nav>

<article class="prose blog-post">
  <div class="blog-post-meta">
    <span class="blog-badge blog-badge--{{ .Params.category }}">
      {{ if eq .Params.category "itinerary" }}Itinerary{{ else if eq .Params.category "guide" }}Guide{{ else }}Development{{ end }}
    </span>
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
  </div>
  <h1>{{ .Title }}</h1>
  {{ with .Params.image }}
  <img class="blog-post-image" src="{{ . }}" alt="">
  {{ end }}
  {{ .Content }}
</article>

{{ end }}
